# Game parameters configuration

game_node:
  num_blocks: 4
  base_length: 3
  length_per_level: 1
  start_delay_sec: 0.8
  player_timeout_sec: 30.0
  no_immediate_repeat: true
  round_pause_sec: 1.0

  disable_red: true
  require_detected_blocks: true
  min_detected_blocks_required: 3
  blocks_wait_sec: 0.5
  block_freshness_sec: 30.0
  motion_timeout_per_target_sec: 15.0
  motion_timeout_padding_sec: 2.0
  motion_retry_limit: 1
  motion_retry_delay_sec: 0.75

  # Raw block-position gate before publishing /target_sequence.
  # Broad enough for the table, but rejects impossible targets like x=2.3 m.
  target_workspace_enable: true
  target_workspace_min_x: -0.50
  target_workspace_max_x: 1.00
  target_workspace_min_y: -0.30
  target_workspace_max_y: 1.00
  target_workspace_min_z: -0.05
  target_workspace_max_z: 0.30
  
  target_frame: "panda_link0"
  target_subscriber_poll_sec: 0.2
  target_subscriber_timeout_sec: 60.0
  
  default_x: 0.40
  default_y: 0.00
  default_z: 0.05

vision_node:
  color_topic: "/realsense/color/image_raw"
  depth_topic: "/realsense/aligned_depth_to_color/image_raw"
  camera_info_topic: "/realsense/color/camera_info"
  target_frame: "panda_link0"
  
  disable_red: true
  enable_debug_images: true
  
  blur_kernel_size: 3
  
  min_block_area: 500
  max_block_area: 60000
  mask_close_iterations: 2
  mask_open_iterations: 2

  depth_window_radius: 2
  min_depth_m: 0.10
  max_depth_m: 2.50
  max_depth_age_sec: 1.0

  base_exclusion_radius_m: 0.20

  # Spherical zones in `target_frame` (panda_link0) where detections are rejected.
  # Use this to mask persistent false positives (e.g., a yellow box in the corner).
  # Each entry: { x, y, z, radius } in meters.
  extra_exclusions:
    - { x: 0.65, y: -0.20, z: 0.0, radius: 0.25 }   # behind blue "corner"
    - { x: 0.65, y: 0.40,  z: 0.0, radius: 0.25 }   # behind green "edge"

  smoothing_alpha: 0.35
  image_track_timeout_sec: 0.5
  position_reset_timeout_sec: 0.5
  max_candidate_jump_px: 120
  max_position_jump_m: 0.10

  hsv_ranges:
    red:
      - [0, 15, 90, 255, 50, 255]
      - [165, 180, 90, 255, 50, 255]
    green:
      - [40, 85, 70, 255, 50, 255]
    blue:
      - [95, 135, 70, 255, 50, 255]
    yellow:
      - [18, 40, 100, 255, 80, 255]

player_selection:
  target_frame: "panda_link0"
  selection_type: "slot_disappeared"
  
  min_slots_to_initialize: 3
  baseline_settle_sec: 0.7
  reset_delay_sec: 3.0
  
  max_slot_distance_m: 0.08
  missing_hold_sec: 0.6
  selection_cooldown_sec: 0.8

motion_node:
  robot_base_frame: "panda_link0"
  end_effector_frame: "panda_link8"
  
  planning_time: 5.0
  max_velocity: 0.1
  max_acceleration: 0.1
  pointing_offset: 0.1
  
  home_position:
    x: 0.3
    y: 0.0
    z: 0.4
    qx: 0.0
    qy: 0.0
    qz: 0.0
    qw: 1.0

motion_moveit_node:
  planning_group: "arm"
  pose_frame: "panda_link0"
  require_pose_frame_match: true
  max_velocity_scaling: 0.12
  max_acceleration_scaling: 0.07
  point_velocity_scaling: 0.08
  point_acceleration_scaling: 0.04
  use_ik_joint_targets: false
  fallback_pose_target_on_ik_failure: true
  ik_timeout: 0.15
  min_hover_z: 0.30
  hover_clearance_z: 0.24
  stage_hover_motion: false
  min_transit_z: 0.40
  xy_waypoint_tolerance: 0.01
  z_waypoint_tolerance: 0.01
  point_clearance_z: 0.10
  min_point_z: 0.14
  min_dip_distance_z: 0.08
  indicate_hold_sec: 0.20
  max_plan_retries: 3
  strict_pointing: false
  close_gripper_for_pointing: false
  gripper_action_name: "/franka_gripper/move"
  gripper_closed_width: 0.0
  gripper_speed: 0.06
  gripper_wait_timeout_sec: 0.25
  gripper_result_timeout_sec: 2.5
  return_home: true
  use_current_state_as_home: true
  keep_current_orientation: false
  
  workspace_enable: false
  workspace_min_x: -10.0
  workspace_max_x: 10.0
  workspace_min_y: -10.0
  workspace_max_y: 10.0
  workspace_min_z: -10.0
  workspace_max_z: 10.0
